name: CI

on:
  push:
    branches: ["master", "main"]
  pull_request:
    branches: ["master", "main"]

jobs:
  validate-html:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Validate index.html with HTMLHint
        run: npx --yes htmlhint@1.6.3 --config .htmlhintrc index.html

      - name: Check legal links are reachable
        run: |
          set -euo pipefail
          urls=(
            "https://smartadvice.es/aviso-legal"
            "https://smartadvice.es/privacidad"
            "https://smartadvice.es/politica-cookies"
            "https://smartadvice.es/terminos-uso"
            "https://smartadvice.es/condiciones-contratacion"
          )

          for url in "${urls[@]}"; do
            echo "Checking $url"
            curl -fsSLI --retry 2 --retry-all-errors --max-time 20 "$url" > /dev/null
          done
