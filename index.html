<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Smart Advice — Tu copiloto empresarial</title>
<meta name="description" content="Smart Advice combina inteligencia artificial con el respaldo de profesionales especializados para gestionar riesgos legales, industriales, de ciberseguridad y seguros." />
<link rel="canonical" href="https://smartadvice.es/" />
<link rel="icon" type="image/png" href="https://framerusercontent.com/images/FlcTYSpAwveQR4z2IwyTfAUJQ.png" />
<link rel="apple-touch-icon" href="https://framerusercontent.com/images/FlcTYSpAwveQR4z2IwyTfAUJQ.png" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Spectral:ital,wght@0,400;0,500;0,600;0,700;0,800;1,500;1,600&family=Libre+Franklin:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<style>
:root{
  --ink:#0B2A23;
  --brand-900:#0B362C;
  --brand-800:#0F4537;
  --brand-700:#155547;
  --teal:#1E9C80;
  --teal-600:#178a70;
  --teal-soft:#7FB6A7;
  --sage:#9DBBB1;
  --bg:#ffffff;
  --bg-soft:#F1F6F3;
  --bg-soft2:#E9F1ED;
  --line:#E1E9E5;
  --line-strong:#CDD9D3;
  --muted:#566B64;
  --muted-2:#7C8C86;
  --red:#C8443A; --red-bg:#FBE8E6;
  --orange:#BC6E22; --orange-bg:#FAEFDF;
  --green:#2C8568; --green-bg:#E3F1EB;
  --radius:18px;
  --shadow-sm:0 1px 2px rgba(11,42,35,.05), 0 1px 1px rgba(11,42,35,.04);
  --shadow:0 18px 40px -24px rgba(11,42,35,.28), 0 4px 12px -6px rgba(11,42,35,.10);
  --maxw:1200px;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{
  font-family:"Libre Franklin",-apple-system,system-ui,sans-serif;
  color:var(--ink);
  background:var(--bg);
  -webkit-font-smoothing:antialiased;
  line-height:1.55;
  letter-spacing:-.004em;
}
a{color:inherit;text-decoration:none}
.serif{font-family:"Spectral",Georgia,serif}
.wrap{max-width:var(--maxw);margin:0 auto;padding:0 28px}
.eyebrow{
  font-size:12.5px;font-weight:700;letter-spacing:.2em;text-transform:uppercase;
  color:var(--teal-600);
}
.tag-pill{
  display:inline-flex;align-items:center;gap:8px;
  font-size:12px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;
  color:var(--teal-600);background:var(--bg-soft2);
  border:1px solid var(--line);border-radius:999px;padding:7px 14px;
}
h1,h2,h3{font-family:"Spectral",Georgia,serif;font-weight:700;letter-spacing:-.018em;line-height:1.1;color:var(--ink)}
section{position:relative}
.sec-pad{padding:96px 0}
.sec-dark{background:var(--brand-900);color:#EAF3EF}
.sec-soft{background:var(--bg-soft)}
.center{text-align:center}
.lead{color:var(--muted);font-size:18px;max-width:640px}
.sec-dark .lead{color:#A9C6BC}

/* ---- buttons : tactile, layered depth ---- */
.btn{
  position:relative;
  display:inline-flex;align-items:center;justify-content:center;gap:9px;
  font-family:"Libre Franklin",sans-serif;font-weight:700;font-size:15px;letter-spacing:.005em;
  border-radius:13px;padding:15px 26px;cursor:pointer;border:1px solid transparent;
  transition:transform .14s cubic-bezier(.3,.7,.4,1), box-shadow .18s ease, filter .18s ease;
  white-space:nowrap;-webkit-tap-highlight-color:transparent;
}
.btn:active{transform:translateY(1px) scale(.997)}

/* dark / primary */
.btn-primary{
  color:#fff;border-color:#082a22;
  background:linear-gradient(180deg,#1a4d40 0%,#103a2f 52%,#0c2f26 100%);
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,.18),
    inset 0 -2px 4px rgba(0,0,0,.28),
    0 2px 3px rgba(8,33,27,.28),
    0 10px 22px -8px rgba(8,33,27,.55);
}
.btn-primary:hover{transform:translateY(-2px);box-shadow:
    inset 0 1px 0 rgba(255,255,255,.22),
    inset 0 -2px 4px rgba(0,0,0,.28),
    0 4px 6px rgba(8,33,27,.3),
    0 18px 32px -10px rgba(8,33,27,.6);filter:brightness(1.06)}
.btn-primary:active{box-shadow:inset 0 2px 5px rgba(0,0,0,.4),0 2px 5px rgba(8,33,27,.4)}

/* teal / accent */
.btn-teal{
  color:#fff;border-color:#0f7a62;
  background:linear-gradient(180deg,#2bbd9c 0%,#1e9c80 50%,#178a70 100%);
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,.4),
    inset 0 -2px 5px rgba(6,70,56,.35),
    0 2px 3px rgba(15,122,98,.3),
    0 12px 24px -8px rgba(15,122,98,.6);
}
.btn-teal:hover{transform:translateY(-2px);box-shadow:
    inset 0 1px 0 rgba(255,255,255,.5),
    inset 0 -2px 5px rgba(6,70,56,.35),
    0 5px 8px rgba(15,122,98,.32),
    0 20px 36px -10px rgba(15,122,98,.7);filter:brightness(1.05)}
.btn-teal:active{box-shadow:inset 0 2px 6px rgba(6,70,56,.5),0 2px 5px rgba(15,122,98,.4)}

/* ghost / secondary - still clearly a raised button */
.btn-ghost{
  color:var(--ink);border-color:#cdd9d3;
  background:linear-gradient(180deg,#ffffff 0%,#eef4f1 100%);
  box-shadow:
    inset 0 1px 0 #ffffff,
    0 1px 2px rgba(11,42,35,.08),
    0 8px 18px -10px rgba(11,42,35,.3);
}
.btn-ghost:hover{transform:translateY(-2px);border-color:#aebfb8;box-shadow:
    inset 0 1px 0 #ffffff,
    0 2px 4px rgba(11,42,35,.1),
    0 16px 28px -12px rgba(11,42,35,.36)}
.btn-ghost:active{box-shadow:inset 0 2px 4px rgba(11,42,35,.12)}
/* ghost on dark sections */
.sec-dark .btn-ghost{
  color:#fff;border-color:rgba(255,255,255,.28);
  background:linear-gradient(180deg,rgba(255,255,255,.14),rgba(255,255,255,.05));
  box-shadow:inset 0 1px 0 rgba(255,255,255,.22),0 10px 22px -12px rgba(0,0,0,.5);
}
.sec-dark .btn-ghost:hover{border-color:rgba(255,255,255,.55);background:linear-gradient(180deg,rgba(255,255,255,.2),rgba(255,255,255,.08))}
.btn-light{background:#fff;color:var(--ink)}

/* ---- header ---- */
header.nav{
  position:sticky;top:0;z-index:50;background:rgba(255,255,255,.86);
  backdrop-filter:saturate(160%) blur(12px);border-bottom:1px solid var(--line);
}
.nav-inner{display:flex;align-items:center;justify-content:space-between;height:70px}
.brand{display:flex;align-items:center;gap:11px;font-family:"Libre Franklin",sans-serif;font-weight:700;font-size:20px;letter-spacing:-.01em;color:var(--ink)}
.brand .mark{height:30px;width:auto;flex:0 0 auto;display:block}
.nav-links{display:flex;align-items:center;gap:30px}
.nav-links a{font-size:15px;font-weight:600;color:#33453F}
.nav-links a:hover{color:var(--teal-600)}
.nav-right{display:flex;align-items:center;gap:20px}
.nav-login{font-size:15px;font-weight:600;color:#33453F}
.nav-login:hover{color:var(--teal-600)}
.nav-cta svg{flex:0 0 auto}
.menu-btn{display:none;background:none;border:0;cursor:pointer}

/* ---- hero ---- */
.hero{padding:78px 0 92px;background:
   radial-gradient(900px 420px at 50% -120px, #E6F1EC 0%, rgba(230,241,236,0) 70%),#fff;}
.hero .badge{
  display:inline-flex;align-items:center;gap:9px;font-size:13.5px;font-weight:600;
  color:#2E5247;background:#fff;border:1px solid var(--line-strong);
  border-radius:999px;padding:8px 16px;box-shadow:var(--shadow-sm);
}
.hero h1{font-size:clamp(38px,5.4vw,68px);max-width:14ch;margin:24px auto 0}
.hero h1 .accent{font-style:italic;font-weight:500;color:var(--teal)}
.hero .lead{margin:24px auto 0;font-size:19px}
.hero-cta{display:flex;gap:14px;justify-content:center;margin-top:34px;flex-wrap:wrap}
.trust{display:flex;gap:26px;justify-content:center;margin-top:28px;flex-wrap:wrap;
  font-size:14px;font-weight:600;color:var(--muted)}
.trust span{display:inline-flex;align-items:center;gap:7px}
.trust .ck{color:var(--teal)}

/* ---- grids ---- */
.grid{display:grid;gap:22px}
.g2{grid-template-columns:repeat(2,1fr)}
.g3{grid-template-columns:repeat(3,1fr)}
.g4{grid-template-columns:repeat(4,1fr)}
.head-block{max-width:760px;margin:0 auto 56px}
.head-left{margin:0 0 52px;max-width:760px}

/* ---- generic card ---- */
.card{background:#fff;border:1px solid var(--line);border-radius:var(--radius);padding:26px;
  box-shadow:var(--shadow-sm);transition:transform .18s ease, box-shadow .2s ease, border-color .2s}
.card:hover{transform:translateY(-3px);box-shadow:var(--shadow);border-color:var(--line-strong)}
.card .ttl{font-family:"Spectral";font-weight:600;font-size:19px;margin:14px 0 8px;line-height:1.25}
.card p{color:var(--muted);font-size:15px}
.kicker{font-size:11.5px;font-weight:700;letter-spacing:.13em;text-transform:uppercase;color:var(--teal-600)}

/* prevención dark cards */
.prev-card{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.12);border-radius:16px;padding:24px}
.prev-card .kicker{color:var(--teal-soft)}
.prev-card .ttl{font-family:"Spectral";font-weight:600;font-size:18px;color:#fff;margin:12px 0 9px;line-height:1.25}
.prev-card p{color:#A9C6BC;font-size:14.5px}
.afterline{margin-top:46px;text-align:center;font-weight:700;font-size:17px;color:#DCEAE4}
.afterline em{font-style:normal;color:var(--teal-soft)}

/* quote cards */
.q-card{background:#fff;border:1px solid var(--line);border-radius:16px;padding:24px 24px 26px;box-shadow:var(--shadow-sm);transition:transform .18s,box-shadow .2s,border-color .2s}
.q-card:hover{transform:translateY(-3px);box-shadow:var(--shadow);border-color:var(--line-strong)}
.q-card .qm{font-family:"Spectral";font-size:34px;line-height:.6;color:var(--teal);font-weight:700}
.q-card p{font-family:"Spectral";font-style:italic;font-size:16.5px;color:#2C3B36;margin-top:14px}
.center-note{margin-top:46px;text-align:center;font-weight:700;font-size:17px;color:var(--ink)}

/* comparison table */
.cmp{max-width:1000px;margin:0 auto;border:1px solid var(--line);border-radius:20px;overflow:hidden;background:#fff;box-shadow:var(--shadow)}
.cmp-row{display:grid;grid-template-columns:1.1fr 1.3fr 1.3fr;border-top:1px solid var(--line)}
.cmp-row:first-child{border-top:0}
.cmp-row>div{padding:20px 24px;display:flex;align-items:center}
.cmp-h{background:#fff}
.cmp-h .c-feat{font-weight:700}
.cmp-h .c-gen{flex-direction:column;align-items:flex-start;background:#F4F7F5}
.cmp-h .c-gen b{font-weight:800;letter-spacing:.04em}
.cmp-h .c-gen small{color:var(--muted-2);font-weight:600;font-size:11.5px;margin-top:3px}
.cmp-h .c-sa{background:var(--brand-900);color:#fff;font-weight:800;letter-spacing:.04em;justify-content:center}
.c-feat{font-weight:700;font-size:15.5px;color:var(--ink)}
.c-gen{color:var(--muted);font-size:14.5px;background:#FAFCFB}
.c-sa{background:#F3F9F6;font-weight:600;font-size:14.5px;color:#163F34;gap:9px}
.c-sa .ck{color:var(--teal);flex:0 0 auto;margin-top:1px}
.cmp-tag{display:none}
.c-sa .cmp-val{display:inline-flex;align-items:flex-start;gap:9px}
.cmp-foot{margin-top:34px;text-align:center;color:var(--muted);font-size:16px}
.cmp-foot b{color:var(--ink)}

/* product mockups */
.mock{background:#fff;border:1px solid var(--line);border-radius:18px;overflow:hidden;box-shadow:var(--shadow)}
.mock-bar{background:var(--brand-900);display:flex;align-items:center;gap:9px;padding:13px 18px}
.dot{width:11px;height:11px;border-radius:50%}
.mock-title{color:#CDE3DB;font-size:12px;font-weight:700;letter-spacing:.06em;margin-left:8px}
.mock-body{padding:22px}
.mock-step{font-size:11px;font-weight:700;letter-spacing:.1em;color:var(--teal-600);text-transform:uppercase;margin-bottom:16px}
.bubble-user{background:var(--brand-800);color:#EAF3EF;border-radius:16px 16px 4px 16px;padding:14px 16px;font-size:14px;margin-left:auto;max-width:86%}
.bubble-ai{background:var(--bg-soft);border:1px solid var(--line);border-radius:16px 16px 16px 4px;padding:14px 16px;font-size:14px;color:#2A3A35;margin-top:14px;max-width:92%}
.bubble-ai b{font-weight:700}
.chips{display:flex;flex-wrap:wrap;gap:7px;margin-top:12px}
.chip{font-size:11px;font-weight:700;color:var(--teal-600);background:var(--bg-soft2);border:1px solid var(--line);border-radius:7px;padding:4px 9px}
.risk{border-radius:12px;padding:13px 15px;margin-top:12px;border:1px solid var(--line)}
.risk h5{font-size:12.5px;font-weight:800;letter-spacing:.02em;margin-bottom:5px}
.risk p{font-size:13px;color:var(--muted)}
.risk.hi{background:#FCEFEE;border-color:#F3D6D3}.risk.hi h5{color:var(--red)}
.risk.mid{background:#FBF2E6;border-color:#F0DEC4}.risk.mid h5{color:var(--orange)}
.risk.ok{background:var(--green-bg);border-color:#CBE5D9}.risk.ok h5{color:var(--green)}
.panel-row{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:13px 2px;border-top:1px solid var(--line)}
.panel-row:first-child{border-top:0}
.panel-row span{font-size:14px;font-weight:600;color:#2A3A35}
.badge-st{font-size:11.5px;font-weight:700;border-radius:999px;padding:5px 11px;white-space:nowrap}
.st-red{background:var(--red-bg);color:var(--red)}
.st-or{background:var(--orange-bg);color:var(--orange)}
.st-gr{background:var(--green-bg);color:var(--green)}
.prof-btn{background:var(--brand-900);color:#fff;border-radius:14px;padding:16px;text-align:center;margin-top:16px}
.prof-btn b{font-size:14.5px}
.prof-btn small{display:block;color:#A9C6BC;font-size:12px;margin-top:4px}
.mini-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:14px}
.mini{border:1px solid var(--line);border-radius:11px;padding:12px 13px}
.mini b{font-size:13.5px}.mini small{display:block;color:var(--muted-2);font-size:12px;margin-top:2px}

/* areas */
.area{display:flex;gap:16px;background:#fff;border:1px solid var(--line);border-radius:15px;padding:20px 22px;box-shadow:var(--shadow-sm);transition:transform .18s,box-shadow .2s,border-color .2s}
.area:hover{transform:translateY(-2px);box-shadow:var(--shadow);border-color:var(--line-strong)}
.area .cat{flex:0 0 auto;font-size:10.5px;font-weight:800;letter-spacing:.08em;color:var(--teal-600);background:var(--bg-soft2);border-radius:7px;padding:6px 9px;height:fit-content}
.area .ttl{font-family:"Spectral";font-weight:600;font-size:17px;margin-bottom:5px}
.area p{color:var(--muted);font-size:14px}

/* pillars */
.pillar{background:rgba(255,255,255,.045);border:1px solid rgba(255,255,255,.12);border-radius:16px;padding:28px}
.pillar-head{display:flex;align-items:baseline;gap:12px;margin-bottom:10px}
.pillar .num{font-family:"Spectral";font-size:22px;font-weight:700;color:var(--teal-soft);letter-spacing:.06em;flex:0 0 auto}
.pillar .ttl{font-family:"Spectral";font-weight:600;font-size:20px;color:#fff;margin:0;line-height:1.22}
.pillar p{color:#A9C6BC;font-size:14.5px}

/* profesionales */
.pro-card{display:flex;flex-direction:column;gap:8px;background:#fff;border:1px solid var(--line);border-radius:15px;padding:22px;box-shadow:var(--shadow-sm);transition:transform .18s,box-shadow .2s,border-color .2s}
.pro-card:hover{transform:translateY(-3px);box-shadow:var(--shadow);border-color:var(--line-strong)}
.pro-ic{width:40px;height:40px;border-radius:11px;background:linear-gradient(150deg,var(--brand-700),var(--brand-900));display:flex;align-items:center;justify-content:center;flex:0 0 auto}
.pro-head{display:flex;align-items:center;gap:12px}
.pro-card .ttl{font-family:"Spectral";font-weight:600;font-size:17px;margin-top:0}
.pro-card p{color:var(--muted);font-size:14px}
.pro-banner{display:flex;gap:16px;align-items:flex-start;background:#fff;border:1px solid var(--line);border-radius:16px;padding:24px 26px;margin-top:30px;box-shadow:var(--shadow-sm)}
.pro-banner p{color:var(--muted);font-size:15.5px}
.pro-banner b{color:var(--ink)}

/* steps */
.step .n{font-family:"Spectral";font-size:62px;font-weight:600;color:var(--teal-soft);line-height:1}
.step .ttl{font-family:"Spectral";font-weight:600;font-size:20px;margin:10px 0 10px;border-top:1px solid var(--line);padding-top:18px}
.step p{color:var(--muted);font-size:15px}

/* pricing */
.price-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:22px;align-items:stretch}
.plan{background:#fff;border:1.5px solid var(--line-strong);border-radius:18px;padding:30px 24px;position:relative;
  display:flex;flex-direction:column;
  box-shadow:0 1px 2px rgba(11,42,35,.06),0 12px 26px -20px rgba(11,42,35,.3);
  transition:transform .18s ease, box-shadow .2s ease, border-color .2s}
.plan:hover{transform:translateY(-5px);border-color:#9CC1B6;box-shadow:0 1px 2px rgba(11,42,35,.06),0 22px 44px -24px rgba(11,42,35,.42)}
.plan .btn{margin-top:auto}
/* PRO destacado */
.plan.pop{
  border:2.5px solid var(--teal);
  background:linear-gradient(180deg,#F2FBF7 0%,#ffffff 58%);
  box-shadow:0 0 0 5px rgba(30,156,128,.12), 0 30px 56px -24px rgba(15,122,98,.55);
  transform:translateY(-14px) scale(1.025);padding-top:40px;z-index:2;
}
.plan.pop:hover{transform:translateY(-19px) scale(1.025);box-shadow:0 0 0 5px rgba(30,156,128,.16), 0 38px 64px -24px rgba(15,122,98,.6)}
.plan.pop .pname{color:var(--teal-600)}
.plan.pop .price{color:var(--teal-600)}
.pop-tag{position:absolute;top:-15px;left:50%;transform:translateX(-50%);
  background:linear-gradient(180deg,#2BBD9C,#178A70);color:#fff;font-size:12px;font-weight:800;letter-spacing:.05em;
  border-radius:999px;padding:8px 18px;white-space:nowrap;
  box-shadow:inset 0 1px 0 rgba(255,255,255,.4),0 8px 16px -5px rgba(15,122,98,.6)}
.plan .pname{font-size:12px;font-weight:800;letter-spacing:.13em;text-transform:uppercase;color:var(--muted-2)}
.plan .price{font-family:"Spectral";font-weight:600;font-size:40px;margin:14px 0 2px}
.plan .price small{font-family:"Libre Franklin",sans-serif;font-size:15px;font-weight:600;color:var(--muted)}
.plan .pdesc{color:var(--muted);font-size:14px;min-height:62px;margin-top:8px}
.plan ul{list-style:none;margin:18px 0 22px;display:flex;flex-direction:column;gap:11px;border-top:1px solid var(--line);padding-top:18px}
.plan li{display:flex;gap:9px;font-size:14px;color:#2C3B36}
.plan li .ck{color:var(--teal);flex:0 0 auto;margin-top:2px}
.plan .btn{width:100%}
.price-foot{margin-top:30px;text-align:center;color:var(--muted-2);font-size:14px;font-weight:600}
.price-foot span{margin:0 14px}

/* faq */
.faq-grid{display:grid;grid-template-columns:1fr 1fr;gap:0 56px;max-width:1040px;margin:0 auto}
.faq-item{border-top:1px solid var(--line-strong);padding:24px 0}
.faq-item h4{font-family:"Spectral";font-weight:600;font-size:18px;margin-bottom:9px}
.faq-item p{color:var(--muted);font-size:15px}

/* final cta */
.final h2{font-size:clamp(30px,4vw,46px);max-width:16ch;margin:0 auto;color:#fff}
.final .lead{margin:20px auto 0;color:#A9C6BC}
.final-cta{display:flex;gap:14px;justify-content:center;margin-top:32px;flex-wrap:wrap}

/* footer */
footer{background:#fff;border-top:1px solid var(--line);padding:62px 0 0}
.foot-grid{display:grid;grid-template-columns:2fr 1fr 1fr 1fr;gap:40px}
.foot-brand p{color:var(--muted);font-size:14.5px;margin:14px 0 12px;max-width:320px}
.foot-brand .mail{color:var(--ink);font-weight:600;font-size:14.5px}
.eu-badge{display:inline-block;margin-top:16px;font-size:12px;font-weight:600;color:var(--muted);border:1px solid var(--line);border-radius:8px;padding:8px 13px}
.foot-col h5{font-size:12px;font-weight:800;letter-spacing:.12em;text-transform:uppercase;color:var(--muted-2);margin-bottom:16px}

/* whatsapp floating button */
.wa-float{
  position:fixed;right:24px;bottom:24px;z-index:80;
  width:60px;height:60px;border-radius:50%;
  background:radial-gradient(circle at 30% 25%,#34e07a,#22b85a 70%);
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 12px 26px -6px rgba(18,140,70,.6),0 2px 6px rgba(0,0,0,.22);
  transition:transform .16s ease, box-shadow .2s ease;
  animation:waPulse 2.6s ease-out infinite;
}
.wa-float:hover{transform:translateY(-2px) scale(1.06)}
.wa-float:active{transform:translateY(0) scale(.98)}
.wa-float svg{width:32px;height:32px;fill:#fff}
@keyframes waPulse{
  0%{box-shadow:0 12px 26px -6px rgba(18,140,70,.6),0 0 0 0 rgba(37,211,102,.5)}
  70%{box-shadow:0 12px 26px -6px rgba(18,140,70,.6),0 0 0 18px rgba(37,211,102,0)}
  100%{box-shadow:0 12px 26px -6px rgba(18,140,70,.6),0 0 0 0 rgba(37,211,102,0)}
}
@media(max-width:760px){.wa-float{right:16px;bottom:16px;width:54px;height:54px}.wa-float svg{width:29px;height:29px}}

/* responsive */
